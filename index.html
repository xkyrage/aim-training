<!DOCTYPE html>
<html>
<head>
  <title>Aim Trainer</title>
  <style>
    body {  
      margin: 0;
      overflow: hidden;
      cursor: none;
      background: url("asset/img/grid-background.jpg") no-repeat center center fixed;
      background-size: cover; 
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
    }

    #crosshair {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Hits: <span id="hits">0</span></div>
  <div>Misses: <span id="misses">0</span></div>
  <div>Accuracy: <span id="accuracy">100%</span></div>
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const MAX_TARGETS = 3;

let scene, camera, renderer, raycaster, mouse;
let targets = [];

let score = 0;
let hits = 0;
let misses = 0;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
  );
  camera.position.z = 5;
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0); 
  document.body.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(0, 0);

  // spawn 3 targets
  for (let i = 0; i < MAX_TARGETS; i++) {
    spawnTarget();
  }

  // mouse movement
  window.addEventListener("mousemove", (event) => {
    const crosshair = document.getElementById("crosshair");
    crosshair.style.left = event.clientX + "px";
    crosshair.style.top = event.clientY + "px";

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  });

  // attach shoot event (you missed this)
  document.addEventListener("mousedown", shoot);
}

// FIXED: now global (not inside init)
function spawnTarget() {
  const geo = new THREE.SphereGeometry(0.3, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const target = new THREE.Mesh(geo, mat);

  let valid = false;

  while (!valid) {
    target.position.x = (Math.random() - 0.5) * 6;
    target.position.y = (Math.random() - 0.5) * 4;
    target.position.z = 0;

    valid = true;

    for (let t of targets) {
      let dist = target.position.distanceTo(t.position);
      if (dist < 1) {
        valid = false;
        break;
      }
    }
  }

  scene.add(target);
  targets.push(target);
}

// FIXED: now global
function shoot() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(targets);

  if (intersects.length > 0) {
    const hit = intersects[0].object;

    scene.remove(hit);
    targets = targets.filter(t => t !== hit);

    score++;
    hits++;

    spawnTarget(); // keep 3 targets
  } else {
    score--;
    misses++;
  }

  updateUI();
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("hits").innerText = hits;
  document.getElementById("misses").innerText = misses;

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(1) : 100;

  document.getElementById("accuracy").innerText = acc + "%";
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
