<!DOCTYPE html>
<html>
<head>
  <title>Aim Trainer</title>
  <style>
    body {  
      margin: 0;
      overflow: hidden;
      cursor: none;
      background: url("asset/img/grid-background.jpg") no-repeat center center fixed;
      background-size: cover; 
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
    }

    #crosshair {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%, -50%);
}

.crosshair-line {
  position: absolute;
  background: rgb(21, 255, 0);
}

.crosshair-outline {
  position: absolute;
  background: black;
}

#footer {
  position: fixed;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  font-family: Arial;
  letter-spacing: 1px;
  pointer-events: none;
  background: black;
}
    }
  </style>
</head>
<body>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Hits: <span id="hits">0</span></div>
  <div>Misses: <span id="misses">0</span></div>
  <div>Accuracy: <span id="accuracy">100%</span></div>
</div>

<div id="crosshair"></div>

<div id="resultPanel" style="
    display: none;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 24px;
    text-align: center;
    z-index: 10;
    background: black;
">
  <div id="finalScore"></div>
  <div id="finalAccuracy"></div>
  <div>Best: <span id="bestScore">0</span></div>
</div>
<button id="playAgain" style="
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:10px 20px;
  font-size:18px;
">
  Play Again
</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
const MAX_TARGETS = 3;
const GAME_DURATION = 60;

let scene, camera, renderer, raycaster, mouse;
let targets = [];

let score = 0;
let hits = 0;
let misses = 0;

let timeLeft = GAME_DURATION;
let gameActive = true;
let timerInterval;

let bestScore = localStorage.getItem("bestScore") || 0;

let targetSpeed = 0.01;

// 🔊 SOUND
const shootSound = new Audio("asset/sound/shoot.mp3");
const hitSound = new Audio("asset/sound/hit.mp3");
const missSound = new Audio("asset/sound/miss.mp3");

// 🎯 CROSSHAIR SETTINGS (like Valorant)
const crosshairSettings = {
  thickness: 2,   // line thickness
  length: 8,      // line length
  gap: 6,         // center gap
  outline: true,
  outlineThickness: 2
};

function createCrosshair() {
  const crosshair = document.getElementById("crosshair");
  crosshair.innerHTML = ""; // reset

  const dirs = ["top", "bottom", "left", "right"];

  dirs.forEach(dir => {
    // MAIN LINE
    const line = document.createElement("div");
    line.className = "crosshair-line";

    // OUTLINE (optional)
    let outline;
    if (crosshairSettings.outline) {
      outline = document.createElement("div");
      outline.className = "crosshair-outline";
      crosshair.appendChild(outline);
    }

    let sizeMain, sizeOutline;

    if (dir === "top" || dir === "bottom") {
      // vertical lines
      sizeMain = {
        width: crosshairSettings.thickness,
        height: crosshairSettings.length
      };

      sizeOutline = {
        width: crosshairSettings.thickness + crosshairSettings.outlineThickness * 2,
        height: crosshairSettings.length + crosshairSettings.outlineThickness * 2
      };

      line.style.width = sizeMain.width + "px";
      line.style.height = sizeMain.height + "px";

      if (outline) {
        outline.style.width = sizeOutline.width + "px";
        outline.style.height = sizeOutline.height + "px";
      }

      let y = dir === "top"
        ? -(crosshairSettings.gap + crosshairSettings.length)
        : crosshairSettings.gap;

      line.style.left = "50%";
      line.style.top = `calc(50% + ${y}px)`;
      line.style.transform = "translateX(-50%)";

      if (outline) {
        outline.style.left = "50%";
        outline.style.top = `calc(50% + ${y - crosshairSettings.outlineThickness}px)`;
        outline.style.transform = "translateX(-50%)";
      }

    } else {
      // horizontal lines
      sizeMain = {
        width: crosshairSettings.length,
        height: crosshairSettings.thickness
      };

      sizeOutline = {
        width: crosshairSettings.length + crosshairSettings.outlineThickness * 2,
        height: crosshairSettings.thickness + crosshairSettings.outlineThickness * 2
      };

      line.style.width = sizeMain.width + "px";
      line.style.height = sizeMain.height + "px";

      if (outline) {
        outline.style.width = sizeOutline.width + "px";
        outline.style.height = sizeOutline.height + "px";
      }

      let x = dir === "left"
        ? -(crosshairSettings.gap + crosshairSettings.length)
        : crosshairSettings.gap;

      line.style.top = "50%";
      line.style.left = `calc(50% + ${x}px)`;
      line.style.transform = "translateY(-50%)";

      if (outline) {
        outline.style.top = "50%";
        outline.style.left = `calc(50% + ${x - crosshairSettings.outlineThickness}px)`;
        outline.style.transform = "translateY(-50%)";
      }
    }

    if (outline) crosshair.appendChild(outline);
    crosshair.appendChild(line);
  });
}

// initialize crosshair
createCrosshair();

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
  );
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(2, 2, 5);
  scene.add(dirLight);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(0, 0);

  spawnInitialTargets();
  startTimer();

  window.addEventListener("mousemove", (event) => {
    const crosshair = document.getElementById("crosshair");
    crosshair.style.left = event.clientX + "px";
    crosshair.style.top = event.clientY + "px";

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  });

  document.addEventListener("mousedown", shoot);

  // ✅ FIX: attach play again button
  document.getElementById("playAgain").addEventListener("click", resetGame);

  updateUI();
}

function spawnInitialTargets() {
  for (let i = 0; i < MAX_TARGETS; i++) spawnTarget();
}

function spawnTarget() {
  let size = Math.max(0.15, 0.4 - score * 0.005);

  const geo = new THREE.SphereGeometry(size, 32, 32);

  const mat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    roughness: 0.4,
    metalness: 0.2
  });

  const target = new THREE.Mesh(geo, mat);

  let valid = false;

  while (!valid) {
    target.position.x = (Math.random() - 0.5) * 3;
    target.position.y = (Math.random() - 0.5) * 2;
    target.position.z = 0;

    valid = true;

    for (let t of targets) {
      if (target.position.distanceTo(t.position) < 0.8) {
        valid = false;
        break;
      }
    }
  }

  scene.add(target);
  targets.push(target);
}

function shoot() {
  if (!gameActive) return;

  shootSound.currentTime = 0;
  shootSound.play();

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(targets);

  if (intersects.length > 0) {
    const hit = intersects[0].object;

    flashTarget(hit);

    scene.remove(hit);
    targets = targets.filter(t => t !== hit);

    score++;
    hits++;

    targetSpeed = 0.01 + score * 0.0005;

    hitSound.currentTime = 0;
    hitSound.play();

    spawnTarget();
  } else {
    score--;
    misses++;

    missSound.currentTime = 0;
    missSound.play();
  }

  updateUI();
}

function flashTarget(target) {
  const original = target.material.color.getHex();
  target.material.color.set(0xffffff);

  setTimeout(() => {
    target.material.color.set(original);
  }, 100);
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("hits").innerText = hits;
  document.getElementById("misses").innerText = misses;

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(1) : 100;

  document.getElementById("accuracy").innerText = acc + "%";

  const bestEl = document.getElementById("bestScore");
  if (bestEl) bestEl.innerText = bestScore;
}

function startTimer() {
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    if (!gameActive) return;

    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(1) : 0;

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem("bestScore", bestScore);
  }

  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("finalAccuracy").innerText = "Accuracy: " + acc + "%";

  document.getElementById("resultPanel").style.display = "block";

  // ✅ FIX: show button
  document.getElementById("playAgain").style.display = "block";
}

function resetGame() {
  clearInterval(timerInterval);

  score = 0;
  hits = 0;
  misses = 0;
  timeLeft = GAME_DURATION;
  gameActive = true;
  targetSpeed = 0.01;

  targets.forEach(t => scene.remove(t));
  targets = [];

  spawnInitialTargets();

  updateUI();
  document.getElementById("time").innerText = timeLeft;

  document.getElementById("resultPanel").style.display = "none";
  document.getElementById("playAgain").style.display = "none";

  startTimer();
}

function animate() {
  requestAnimationFrame(animate);

  targets.forEach(t => {
    t.position.x += (Math.random() - 0.5) * targetSpeed;
    t.position.y += (Math.random() - 0.5) * targetSpeed;
  });

  renderer.render(scene, camera);
}
</script>
<div id="timerUI" style="position:absolute; top:10px; right:10px; color:white;">
  Time: <span id="time">60</span>
</div>

<footer id="footer">
  Aim Trainer - xkysoft interactive 2026
</footer>
</body>
</html>
