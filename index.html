<!DOCTYPE html>
<html>
<head>
  <title>Aim Trainer</title>
  <style>
    body {  
      margin: 0;
      overflow: hidden;
      cursor: none;
      background: url("asset/img/grid-background.jpg") no-repeat center center fixed;
      background-size: cover; 
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
    }

    #crosshair {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Hits: <span id="hits">0</span></div>
  <div>Misses: <span id="misses">0</span></div>
  <div>Accuracy: <span id="accuracy">100%</span></div>
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const MAX_TARGETS = 3;
const GAME_DURATION = 60;

let scene, camera, renderer, raycaster, mouse;
let targets = [];

let score = 0;
let hits = 0;
let misses = 0;

let timeLeft = GAME_DURATION;
let gameActive = true;
let timerInterval;

// 🔊 SOUND
const shootSound = new Audio("asset/sound/shoot.mp3");
const hitSound = new Audio("asset/sound/hit.mp3");
const missSound = new Audio("asset/sound/miss.mp3");

shootSound.volume = 0.5;
hitSound.volume = 0.7;
missSound.volume = 0.5;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
  );
  camera.position.z = 5;
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0); 
  document.body.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(0, 0);

  // ✅ spawn targets (VISIBLE RANGE FIXED)
  spawnInitialTargets();

  // start timer AFTER everything ready
  startTimer();

  // mouse movement
  window.addEventListener("mousemove", (event) => {
    const crosshair = document.getElementById("crosshair");
    crosshair.style.left = event.clientX + "px";
    crosshair.style.top = event.clientY + "px";

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  });

  document.addEventListener("mousedown", shoot);
window.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("playAgain");
  if (btn) {
    btn.addEventListener("click", resetGame);
  }
});
}

function spawnInitialTargets() {
  for (let i = 0; i < MAX_TARGETS; i++) {
    spawnTarget();
  }
}

// ✅ FIXED RANGE (THIS WAS YOUR MAIN BUG)
function spawnTarget() {
  const geo = new THREE.SphereGeometry(0.4, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const target = new THREE.Mesh(geo, mat);

  let valid = false;

  while (!valid) {
    const rangeX = 3;   // FIXED
    const rangeY = 2;   // FIXED

    target.position.x = (Math.random() - 0.5) * rangeX;
    target.position.y = (Math.random() - 0.5) * rangeY;
    target.position.z = 0;

    valid = true;

    for (let t of targets) {
      let dist = target.position.distanceTo(t.position);
      if (dist < 0.8) {
        valid = false;
        break;
      }
    }
  }

  scene.add(target);
  targets.push(target);
}

function shoot() {
  if (!gameActive) return;

  shootSound.currentTime = 0;
  shootSound.play();

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(targets);

  if (intersects.length > 0) {
    const hit = intersects[0].object;

    scene.remove(hit);
    targets = targets.filter(t => t !== hit);

    score++;
    hits++;

    hitSound.currentTime = 0;
    hitSound.play();

    spawnTarget();
  } else {
    score--;
    misses++;

    missSound.currentTime = 0;
    missSound.play();
  }

  updateUI();
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("hits").innerText = hits;
  document.getElementById("misses").innerText = misses;

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(1) : 100;

  document.getElementById("accuracy").innerText = acc + "%";
}

function startTimer() {
  clearInterval(timerInterval); // prevent duplicates

  timerInterval = setInterval(() => {
    if (!gameActive) return;

    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(1) : 0;

  alert(
    "⏱️ Time's Up!\n\n" +
    "Score: " + score + "\n" +
    "Accuracy: " + acc + "%"
  );

  document.getElementById("playAgain").style.display = "block";
}

function resetGame() {
  // 🔥 STOP old timer first
  clearInterval(timerInterval);

  // reset stats
  score = 0;
  hits = 0;
  misses = 0;
  timeLeft = GAME_DURATION;
  gameActive = true;

  // clear targets
  targets.forEach(t => scene.remove(t));
  targets = [];

  spawnInitialTargets();

  updateUI();
  document.getElementById("time").innerText = timeLeft;
  document.getElementById("playAgain").style.display = "none";

  // 🔥 start fresh timer
  startTimer();
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>
<div id="timerUI" style="position:absolute; top:10px; right:10px; color:white;">
  Time: <span id="time">60</span>
</div>

<button id="playAgain" style="
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:10px 20px;
  font-size:18px;
">
  Play Again
</button>
</body>
</html>
