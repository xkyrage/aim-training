<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="asset/img/fav.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <title>Aim Trainer</title>
  <style>
    body {  
      margin: 0;
      overflow: hidden;
      cursor: none;
      background: url("asset/img/grid-background.jpg") no-repeat center center fixed;
      background-size: cover; 
    }

   #ui {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0px;
  z-index: 10;
  font-family: Arial, sans-serif;
}

/* HUD boxes */
.hud {
  background: linear-gradient(135deg, #1a1f3c, #2c3566);
  color: white;
  padding: 10px 20px;
  min-width: 120px;
  text-align: center;
  position: relative;
  font-weight: bold;
}

/* Angled edges */
.hud::before,
.hud::after {
  content: "";
  position: absolute;
  top: 0;
  width: 30px;
  height: 100%;
  background: inherit;
}

.hud::before {
  left: -8px;
  transform: skewX(-20deg);
}

.hud::after {
  right: -8px;
  transform: skewX(20deg);
}

/* Center timer bigger */
.hud.center {
  font-size: 22px;
  padding: 10px 30px;
}

/* Label styling */
.label {
  font-size: 12px;
  opacity: 0.7;
  margin-right: 6px;
}

    #crosshair {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%, -50%);
}

.crosshair-line {
  position: absolute;
  background: rgb(21, 255, 0);
}

.crosshair-outline {
  position: absolute;
  background: black;
}

#debugStats {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: rgb(0, 0, 0);
  padding-left: 10px;
  padding-right: 10px;
  font-size: 12px;
  background-color: azure;
  
}

/* 🌑 Overlay */
#resultOverlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  backdrop-filter: blur(-15px);
  background: rgba(0,0,0,0.7);

  z-index: 9999;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🚀 Modal box */
.modal-box {
  animation: popIn 0.3s ease-out;
  font-family: 'Rajdhani', sans-serif;
  background: rgba(10, 15, 40, 0.95);
  border: 2px solid #00ffff;
  padding: 40px 60px;
  border-radius: 16px;

  text-align: center;
  color: white;

  box-shadow: 
    0 0 20px #00ffff,
    0 0 60px rgba(0,255,255,0.3);

  min-width: 300px;
}

@keyframes popIn {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* Title */
.modal-box h2 {
  font-family: 'Rajdhani', sans-serif;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  color: #00ffff;
}

/* Stats */
.stat {
  margin: 12px 0;
  font-size: 18px;
}

/* Button */
#playAgain {
  margin-top: 25px;
  padding: 12px 30px;
  font-size: 16px;

  background: linear-gradient(135deg, #00ffff, #00aaff);
  border: none;
  border-radius: 6px;

  color: black;
  font-weight: bold;
  cursor: pointer;

  transition: 0.2s;
}

#playAgain:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffff;
}

#footer {
  position: fixed;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  font-family: Arial;
  letter-spacing: 1px;
  pointer-events: none;
  background: black;
}
    }
  </style>
</head>
<body>

<div id="ui">
  <div class="hud left">
    <span class="label">PTS</span>
    <span id="score">0</span>
  </div>

  <div class="hud center">
    <span id="time">60</span>
  </div>

  <div class="hud right">
    <span id="accuracy">100%</span>
  </div>
</div>

<div id="debugStats">
  Hits: <span id="hits">0</span> |
  Misses: <span id="misses">0</span>
</div>

<div id="crosshair"></div>

<div id="resultOverlay">
  <div class="modal-box">

    <h2>Aim Training RESULT</h2>

    <div class="stat">
      Score: <span id="finalScore">0</span>
    </div>

    <div class="stat">
      Accuracy: <span id="finalAccuracy">0%</span>
    </div>

    <div class="stat">
      Best: <span id="bestScore">0</span>
    </div>

    <button id="playAgain">Play Again</button>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
const MAX_TARGETS = 3;
const GAME_DURATION = 60;

let scene, camera, renderer, raycaster, mouse;
let targets = [];

let score = 0;
let hits = 0;
let misses = 0;

let timeLeft = GAME_DURATION;
let gameActive = true;
let timerInterval;

let bestScore = localStorage.getItem("bestScore") || 0;

let targetSpeed = 0.01;

// 🔊 SOUND
const shootSound = new Audio("asset/sound/shoot.mp3");
const hitSound = new Audio("asset/sound/hit.mp3");
const missSound = new Audio("asset/sound/miss.mp3");
const endSound = new Audio("asset/sound/notification.mp3")

// 🎯 CROSSHAIR SETTINGS
const crosshairSettings = {
  thickness: 2,
  length: 8,
  gap: 6,
  outline: true,
  outlineThickness: 2
};

function createCrosshair() {
  const crosshair = document.getElementById("crosshair");
  crosshair.innerHTML = "";

  const dirs = ["top", "bottom", "left", "right"];

  dirs.forEach(dir => {
    const line = document.createElement("div");
    line.style.position = "absolute";
    line.style.background = "white";

    if (dir === "top" || dir === "bottom") {
      line.style.width = crosshairSettings.thickness + "px";
      line.style.height = crosshairSettings.length + "px";

      let y = dir === "top"
        ? -(crosshairSettings.gap + crosshairSettings.length)
        : crosshairSettings.gap;

      line.style.left = "50%";
      line.style.top = `calc(50% + ${y}px)`;
      line.style.transform = "translateX(-50%)";

    } else {
      line.style.width = crosshairSettings.length + "px";
      line.style.height = crosshairSettings.thickness + "px";

      let x = dir === "left"
        ? -(crosshairSettings.gap + crosshairSettings.length)
        : crosshairSettings.gap;

      line.style.top = "50%";
      line.style.left = `calc(50% + ${x}px)`;
      line.style.transform = "translateY(-50%)";
    }

    crosshair.appendChild(line);
  });
}

createCrosshair();

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
  );
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(2, 2, 5);
  scene.add(dirLight);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(0, 0);

  spawnInitialTargets();
  startTimer();

  window.addEventListener("mousemove", (event) => {
    const crosshair = document.getElementById("crosshair");
    crosshair.style.left = event.clientX + "px";
    crosshair.style.top = event.clientY + "px";

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  });

  document.addEventListener("mousedown", shoot);

  // ✅ FIX: safe attach
  const btn = document.getElementById("playAgain");
  if (btn) btn.addEventListener("click", resetGame);

  updateUI();
}

function spawnInitialTargets() {
  for (let i = 0; i < MAX_TARGETS; i++) spawnTarget();
}

function spawnTarget() {
  let size = Math.max(0.15, 0.4 - score * 0.005);

  const geo = new THREE.SphereGeometry(size, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    roughness: 0.4,
    metalness: 0.2
  });

  const target = new THREE.Mesh(geo, mat);

  let valid = false;

  while (!valid) {
    target.position.x = (Math.random() - 0.5) * 3;
    target.position.y = (Math.random() - 0.5) * 2;
    target.position.z = 0;

    valid = true;

    for (let t of targets) {
      if (target.position.distanceTo(t.position) < 0.8) {
        valid = false;
        break;
      }
    }
  }

  scene.add(target);
  targets.push(target);
}

function shoot() {
  if (!gameActive) return;

  shootSound.currentTime = 0;
  shootSound.play();

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(targets);

  if (intersects.length > 0) {
    const hit = intersects[0].object;

    flashTarget(hit);

    scene.remove(hit);
    targets = targets.filter(t => t !== hit);

    score++;
    hits++;

    targetSpeed = 0.01 + score * 0.0005;

    hitSound.currentTime = 0;
    hitSound.play();

    spawnTarget();
  } else {
    score--;
    misses++;

    missSound.currentTime = 0;
    missSound.play();
  }

  updateUI();
}

function flashTarget(target) {
  const original = target.material.color.getHex();
  target.material.color.set(0xffffff);

  setTimeout(() => {
    target.material.color.set(original);
  }, 100);
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("hits").innerText = hits;
  document.getElementById("misses").innerText = misses;
  document.getElementById("time").innerText = timeLeft;

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(0) : 100;

  document.getElementById("accuracy").innerText = acc + "%";

  const bestEl = document.getElementById("bestScore");
  if (bestEl) bestEl.innerText = bestScore;
}

function startTimer() {
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    if (!gameActive) return;

    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);

  let total = hits + misses;
  let acc = total > 0 ? ((hits / total) * 100).toFixed(1) : 0;

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem("bestScore", bestScore);
  }

  document.getElementById("finalScore").innerText = score;
  document.getElementById("finalAccuracy").innerText = acc + "%";

  // 🔊 sound
  endSound.currentTime = 0;
  endSound.play();

  // ✅ SHOW MODAL
  document.getElementById("resultOverlay").style.display = "flex";

  // 🖱️ RESTORE NORMAL CURSOR
  document.body.style.cursor = "default";

  // ❌ HIDE CROSSHAIR
  document.getElementById("crosshair").style.display = "none";
}

function resetGame() {
  clearInterval(timerInterval);

  score = 0;
  hits = 0;
  misses = 0;
  timeLeft = GAME_DURATION;
  gameActive = true;
  targetSpeed = 0.01;

  targets.forEach(t => scene.remove(t));
  targets = [];

  spawnInitialTargets();

  updateUI();

  // ❌ HIDE MODAL
  document.getElementById("resultOverlay").style.display = "none";

  // 🎯 RESTORE CROSSHAIR
  document.body.style.cursor = "none";
  document.getElementById("crosshair").style.display = "block";

  document.getElementById("time").innerText = timeLeft;

  startTimer();
}

function animate() {
  requestAnimationFrame(animate);

  targets.forEach(t => {
    t.position.x += (Math.random() - 0.5) * targetSpeed;
    t.position.y += (Math.random() - 0.5) * targetSpeed;
  });

  renderer.render(scene, camera);
}
</script>

<footer id="footer">
  Aim Trainer - "xkysoft interactive" Tegar Ibrahim 2026
</footer>
</body>
</html>
