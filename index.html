<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="asset/img/fav.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Aim Trainer</title>
 <style>
  body { 
          background: url("asset/img/grid-background.jpg") no-repeat center center fixed;
          background-size: cover; 
 }
 </style>
</head>
<body>

<div id="ui">
  <div class="hud left">
    <span class="label">PTS</span>
    <span id="score">0</span>
  </div>

  <div class="hud center">
    <span id="time">60</span>
  </div>

  <div class="hud right">
    <span id="accuracy">100%</span>
  </div>
</div>

<div id="debugStats">
  Hits: <span id="hits">0</span> |
  Misses: <span id="misses">0</span>
</div>

<div id="crosshair"></div>

<div id="resultOverlay">
  <div class="modal-box">

    <h2>Aim Training RESULT</h2>

    <div class="stat">
      Score: <span id="finalScore">0</span>
    </div>

    <div class="stat">
      Accuracy: <span id="finalAccuracy">0%</span>
    </div>

    <div class="stat">
      Best: <span id="bestScore">0</span>
    </div>

    <button id="playAgain">Play Again</button>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script type="module" src="js/engine.js"></script>


<footer id="footer">
  Aim Trainer - "xkysoft interactive" Tegar Ibrahim 2026
</footer>
</body>
</html>
